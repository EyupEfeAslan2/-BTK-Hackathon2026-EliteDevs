version: '3.8'

services:
  ai-worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    container_name: ai-worker
    ports:
      - "8000:8000"
    # Pass the .env file to the container
    env_file:
      - ./ai-worker/.env
    networks:
      - hackathon-net
    restart: unless-stopped

  go-gateway:
    build:
      context: ./go-gateway
      dockerfile: Dockerfile
    container_name: go-gateway
    ports:
      - "3030:3030"
    environment:
      # Inject the AI worker URL for the Go app to use
      - AI_WORKER_URL=http://ai-worker:8000
    depends_on:
      - ai-worker
    networks:
      - hackathon-net
    restart: unless-stopped

networks:
  hackathon-net:
    driver: bridge
    name: hackathon-bridge-network
